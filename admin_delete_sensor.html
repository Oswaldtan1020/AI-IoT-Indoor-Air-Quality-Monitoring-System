<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Sensor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Reuse animations & styles -->
  <link rel="stylesheet" href="admin_delete_sensor.css">
</head>
<body>

<script>
  if (!localStorage.getItem("jwt")) {
    window.location.href = "admin_login.html";
  }
</script>

<!-- ===============================
     FEEDBACK OVERLAY
=============================== -->
<div id="feedbackOverlay" class="feedback-overlay d-none">
  <div class="feedback-card">

    <!-- SUCCESS -->
    <div id="successIcon" class="checkmark d-none">
      <svg viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark-check" fill="none"
          d="M14 27 l7 7 l17 -17"/>
      </svg>
    </div>

    <!-- ERROR -->
    <div id="errorIcon" class="error-icon d-none">❌</div>

    <h5 id="feedbackText" class="mt-3"></h5>
  </div>
</div>

<div class="container mt-5">
  <div class="card shadow-sm p-4 text-center">

    <h4 class="mb-3 text-danger">⚠️ Delete Sensor</h4>
    <p class="mb-4">
      Are you sure you want to delete this sensor?<br>
      <strong>This action cannot be undone.</strong>
    </p>

    <div class="d-flex justify-content-center gap-3">
      <button class="btn btn-danger" onclick="confirmDelete()">
        Yes, Delete
      </button>
      <button class="btn btn-secondary" onclick="goBack()">
        Cancel
      </button>
    </div>

  </div>
</div>

<script>
const API = "https://ai-iot-indoor-air-quality-monitoring-system-production.up.railway.app/api";
const params = new URLSearchParams(window.location.search);
const sensorId = params.get("id");

function confirmDelete() {
  if (!sensorId) {
    showError("Invalid sensor ID");
    return;
  }

  fetch(`${API}/admin/sensors/${sensorId}`, {
    method: "DELETE",
    headers: {
      Authorization: `Bearer ${localStorage.getItem("jwt")}`
    }
  })
  .then(async res => {
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || "Unable to delete sensor");
      return;
    }

    showSuccess("Sensor deleted successfully");
  })
  .catch(err => {
    console.error(err);
    showError("Server error");
  });
}

/* ------------------------------
   FEEDBACK HANDLER
------------------------------ */
function showSuccess(message) {
  showFeedback("success", message, "admin_panel.html#sensors");
}

function showError(message) {
  showFeedback("error", message);
}

function showFeedback(type, message, redirectUrl = null) {
  const overlay = document.getElementById("feedbackOverlay");
  const successIcon = document.getElementById("successIcon");
  const errorIcon = document.getElementById("errorIcon");
  const text = document.getElementById("feedbackText");

  successIcon.classList.add("d-none");
  errorIcon.classList.add("d-none");

  if (type === "success") {
    successIcon.classList.remove("d-none");
  } else {
    errorIcon.classList.remove("d-none");
  }

  text.textContent = message;
  overlay.classList.remove("d-none");

  setTimeout(() => {
    overlay.classList.add("d-none");
    if (redirectUrl) {
      window.location.href = redirectUrl;
    }
  }, type === "success" ? 1200 : 1500);
}

function goBack() {
  window.location.href = "admin_panel.html#sensors";
}
</script>

</body>
</html>
