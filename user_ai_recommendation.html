<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Recommendation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="user_ai_recommendation.css">
</head>
<body class="bg-light">

<script>
  if (!localStorage.getItem("jwt")) {
    window.location.href = "user_login.html";
  }
</script>

<div class="ai-card">
  <h4 class="ai-title">🤖 AI Air Quality Recommendation</h4>
  <p id="roomName" class="ai-room"></p>

  <div id="aiResult" class="ai-status waiting">
    Loading recommendation...
  </div>

  <button class="btn-back" onclick="goBack()">
    Back
  </button>
</div>

<script>

const API = "http://localhost:5000/api";

const token =
  localStorage.getItem("jwt");

const params =
  new URLSearchParams(window.location.search);

const room =
  params.get("room");

// ✅ Room Name
document.getElementById("roomName").innerText =
  "Room: " + room;

// ✅ DATE FORMATTER
function formatDateTime(dateString) {

  if (!dateString) return "-";

  return new Date(dateString)
    .toLocaleString("en-GB", {

      day: "2-digit",
      month: "2-digit",
      year: "numeric",

      hour: "2-digit",
      minute: "2-digit"

    });

}

// ✅ MAIN FUNCTION
async function loadAIRecommendation() {

  try {

    const res = await fetch(

      `${API}/user/ai-recommendation?room=${encodeURIComponent(room)}`,

      {
        headers: {
          Authorization: `Bearer ${token}`
        }
      }

    );

    const data = await res.json();

    const result =
      document.getElementById("aiResult");

    // ⏳ WAITING
    if (
      !res.ok &&
      data.error ===
      "AI recommendation not available yet"
    ) {

      result.className =
        "ai-status waiting";

      result.innerHTML = `

        <strong>
          ⏳ Waiting for AI Recommendation
        </strong>

        <br>

        The administrator has not generated
        the AI recommendation for this room yet.

        <br><br>

        <small class="text-muted">
          Auto-refreshing every 10 seconds...
        </small>

      `;

      return;
    }

    // ❌ REAL ERROR
    if (!res.ok) {
      throw new Error("Server error");
    }

    // ✅ STATUS COLOR
    let statusClass = "good";

    if (data.status === "WARNING") {
      statusClass = "warning";
    }

    if (data.status === "DANGEROUS") {
      statusClass = "danger";
    }

    result.className =
      `ai-status ${statusClass}`;

    // ✅ UPDATE CONTENT
    result.innerHTML = `

      <h5 class="mb-3">

        Status: ${data.status}

      </h5>

      <ul class="mb-3">

        ${data.actions.map(a =>

          `<li>
            ${a.replace(/^\d+\.\s*/, "")}
          </li>`

        ).join("")}

      </ul>

      <small class="text-muted">

        Generated at:
        ${formatDateTime(data.generated_at)}

      </small>

      <br>

      <small class="text-muted">

        Auto-updating every 10 seconds

      </small>

    `;

  }
  catch (err) {

    console.error(err);

    const result =
      document.getElementById("aiResult");

    result.className =
      "ai-status danger";

    result.innerHTML = `

      Failed to load AI recommendation.

      <br><br>

      <small>
        Retrying automatically...
      </small>

    `;

  }

}

// ✅ FIRST LOAD
loadAIRecommendation();

// ✅ AUTO REFRESH
setInterval(loadAIRecommendation, 10000);

function goBack() {
  window.history.back();
}

</script>

</body>
</html>
