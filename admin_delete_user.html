<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete User</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="admin_delete_user.css">
</head>

<body>

<script>
  if (!localStorage.getItem("jwt")) {
    window.location.href = "admin_login.html";
  }
</script>

<div class="card-ui">
  <h3 class="text-danger">⚠ Delete User</h3>

  <p class="mt-3">
    Are you sure you want to delete the following user?
  </p>

  <div class="mb-3">
    <label>Name</label>
    <input type="text" id="name" class="form-control" disabled>
  </div>

  <div class="mb-3">
    <label>Username</label>
    <input type="text" id="username" class="form-control" disabled>
  </div>

  <div class="mb-3">
    <label>Role</label>
    <input type="text" id="role" class="form-control" disabled>
  </div>

  <div class="alert alert-danger">
    This action <strong>cannot be undone</strong>.
  </div>

  <button class="btn btn-danger w-100" onclick="confirmDelete()">
    ❌ Confirm Delete
  </button>

  <button class="btn btn-secondary w-100 mt-2" onclick="goBack()">
    Cancel
  </button>
</div>

<script>
const API = "https://ai-iot-indoor-air-quality-monitoring-system-production.up.railway.app/api";
const params = new URLSearchParams(window.location.search);
const userId = params.get("id");

if (!userId) {
  window.location.href = "admin_panel.html";
}

// Load user info
fetch(`${API}/admin/users`, {
  headers: { Authorization: `Bearer ${localStorage.getItem("jwt")}` }
})
.then(res => res.json())
.then(users => {
  const user = users.find(u => u.id == userId);
  if (!user) {
    alert("User not found");
    goBack();
    return;
  }

  document.getElementById("name").value = user.name;
  document.getElementById("username").value = user.username;
  document.getElementById("role").value = user.role;
});

// Confirm delete
function confirmDelete() {
  fetch(`${API}/admin/users/${userId}`, {
    method: "DELETE",
    headers: {
      Authorization: `Bearer ${localStorage.getItem("jwt")}`
    }
  })
  .then(async res => {
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || "Unable to delete user");
      return;
    }

    showSuccess("User deleted successfully", "admin_panel.html#users");
  })
  .catch(err => {
    console.error(err);
    showError("Server error");
  });
}

function showSuccess(message, redirectUrl) {
  showFeedback("success", message, redirectUrl);
}

function showError(message) {
  showFeedback("error", message);
}

function showFeedback(type, message, redirectUrl = null) {
  const overlay = document.getElementById("feedbackOverlay");
  const successIcon = document.getElementById("successIcon");
  const errorIcon = document.getElementById("errorIcon");
  const text = document.getElementById("feedbackText");

  successIcon.classList.add("d-none");
  errorIcon.classList.add("d-none");

  if (type === "success") {
    // 🔄 Reset SVG animation
    successIcon.innerHTML = successIcon.innerHTML;
    successIcon.classList.remove("d-none");
  } else {
    errorIcon.classList.remove("d-none");
  }

  text.textContent = message;
  overlay.classList.remove("d-none");

  setTimeout(() => {
    overlay.classList.add("d-none");
    if (redirectUrl) {
      window.location.href = redirectUrl;
    }
  }, type === "success" ? 1200 : 1500);
}

function goBack() {
  window.location.href = "admin_panel.html#users";
}
</script>

<!-- ===============================
     FEEDBACK OVERLAY
=============================== -->
<div id="feedbackOverlay" class="feedback-overlay d-none">
  <div class="feedback-card">

    <!-- SUCCESS -->
    <div id="successIcon" class="checkmark d-none">
      <svg viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark-check" fill="none"
          d="M14 27 l7 7 l17 -17"/>
      </svg>
    </div>

    <!-- ERROR -->
    <div id="errorIcon" class="error-icon d-none">❌</div>

    <h5 id="feedbackText" class="mt-3"></h5>

  </div>
</div>

</body>
</html>
