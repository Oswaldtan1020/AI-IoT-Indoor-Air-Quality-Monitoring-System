<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New User</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="admin_add_user.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>

  <!-- DARK MODE TOGGLE -->
  <button class="dark-toggle" onclick="toggleDarkMode()">
    <i id="darkIcon" class="fa-solid fa-moon"></i>
  </button>

  <div class="card-ui">
    <h3>Add New User</h3>

    <form id="addUserForm" novalidate>

      <!-- NAME -->
      <div class="mb-3">
        <label>Name</label>
        <input type="text" class="form-control" id="name">
        <small class="error-text" id="nameError"></small>
      </div>

      <!-- USERNAME -->
      <div class="mb-3">
        <label>Username</label>
        <input type="text" class="form-control" id="username">
        <small class="error-text" id="usernameError"></small>
      </div>

      <!-- PASSWORD -->
      <div class="mb-3 position-relative">
        <label>Password</label>
        <input type="password" class="form-control" id="password" oninput="checkStrength()">

        <!-- Eye Icon -->
        <i class="fa-solid fa-eye toggle-eye" id="toggleEye" onclick="togglePassword()"></i>

        <!-- Strength Bar -->
        <div class="strength-box mt-2">
          <div id="strengthBar"></div>
        </div>
        <small id="strengthText" class="text-white"></small>
        <small class="error-text" id="passwordError"></small>
      </div>

      <!-- ROLE -->
      <div class="mb-3">
        <label>Role</label>
        <select class="form-select" id="role">
          <option value="admin">Admin</option>
          <option value="user">User</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">Create Account</button>
    </form>

    <button class="btn btn-secondary w-100 mt-3" onclick="goBack()">← Back</button>

  </div>

<script>
const API = "https://ai-iot-indoor-air-quality-monitoring-system-production.up.railway.app/api";

/* ------------------------------
   DARK MODE
------------------------------ */
function toggleDarkMode() {
  document.body.classList.toggle("dark");

  const icon = document.getElementById("darkIcon");
  icon.classList.toggle("fa-sun");
  icon.classList.toggle("fa-moon");

  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark");
    document.getElementById("darkIcon").classList.replace("fa-moon", "fa-sun");
  }
});

/* ------------------------------
   SHOW/HIDE PASSWORD
------------------------------ */
function togglePassword() {
  const input = document.getElementById("password");
  const icon = document.getElementById("toggleEye");

  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
}

/* ------------------------------
   PASSWORD STRENGTH METER
------------------------------ */
function checkStrength() {
  const password = document.getElementById("password").value;
  const bar = document.getElementById("strengthBar");
  const text = document.getElementById("strengthText");

  let strength = 0;

  if (password.length > 6) strength++;
  if (password.match(/[A-Z]/)) strength++;
  if (password.match(/[0-9]/)) strength++;
  if (password.match(/[^A-Za-z0-9]/)) strength++;
  if (password.length > 12) strength++;

  let width = ["20%", "40%", "60%", "80%", "100%"];
  let colors = ["#ff4d4d", "#ff944d", "#ffe44d", "#7dff4d", "#2ecc71"];
  let labels = ["Very Weak", "Weak", "Medium", "Strong", "Very Strong"];

  bar.style.width = width[strength - 1] || "0%";
  bar.style.background = colors[strength - 1] || "#ddd";

  text.innerText = password.length === 0 ? "" : labels[strength - 1];
}

/* ------------------------------
   VALIDATION
------------------------------ */
function showFieldError(id, message) {
  document.getElementById(id).innerText = message;
}

function clearErrors() {
  ["nameError", "usernameError", "passwordError"].forEach(id => {
    document.getElementById(id).innerText = "";
  });
}

/* ------------------------------
   FORM SUBMIT
------------------------------ */
document.getElementById("addUserForm").addEventListener("submit", function (e) {
  e.preventDefault();
  clearErrors();

  let valid = true;

  const name = document.getElementById("name").value.trim();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("role").value;

  if (name === "") {
    showFieldError("nameError", "Name is required");
    valid = false;
  }
  if (username === "") {
    showFieldError("usernameError", "Username is required");
    valid = false;
  }
  if (password.length < 6) {
    showFieldError("passwordError", "Password must be at least 6 characters");
    valid = false;
  }

  if (!valid) return;

  const userData = { name, username, password, role };

  fetch(`${API}/admin/users`, {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${localStorage.getItem("jwt")}`
    },
    body: JSON.stringify(userData)
  })
  
  .then(res => {
    console.log("Status:", res.status);
    return res.json();
  })

  .then(data => {
    if (data.error) {
      showError(data.error);
      return;
    }

    showSuccess("User created successfully", "admin_panel.html");
  })
  .catch(err => {
    console.error(err);
    showError("Failed to create user");
  });
});

function showSuccess(message, redirectUrl) {
  showFeedback("success", message, redirectUrl);
}

function showError(message) {
  showFeedback("error", message);
}

function showFeedback(type, message, redirectUrl = null) {
  const overlay = document.getElementById("feedbackOverlay");
  const successIcon = document.getElementById("successIcon");
  const errorIcon = document.getElementById("errorIcon");
  const text = document.getElementById("feedbackText");

  successIcon.classList.add("d-none");
  errorIcon.classList.add("d-none");

  if (type === "success") {
    // Reset SVG animation
    successIcon.innerHTML = successIcon.innerHTML;

    // Show success icon
    successIcon.classList.remove("d-none");
  } else {
    errorIcon.classList.remove("d-none");
  }

  text.textContent = message;
  overlay.classList.remove("d-none");

  setTimeout(() => {
    overlay.classList.add("d-none");
    if (redirectUrl) {
      window.location.href = redirectUrl;
    }
  }, type === "success" ? 1200 : 1500);
}

function goBack() {
  window.location.href = "admin_panel.html#users";
}
</script>

<!-- ===============================
    FEEDBACK OVERLAY
=============================== -->
<div id="feedbackOverlay" class="feedback-overlay d-none">
  <div class="feedback-card">

    <!-- SUCCESS -->
    <div id="successIcon" class="checkmark d-none">
      <svg viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark-check" fill="none"
          d="M14 27 l7 7 l17 -17"/>
      </svg>
    </div>

    <!-- ERROR -->
    <div id="errorIcon" class="error-icon d-none">❌</div>

    <h5 id="feedbackText" class="mt-3"></h5>
  </div>
</div>

</body>
</html>
