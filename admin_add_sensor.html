<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Sensor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Page Styles -->
  <link rel="stylesheet" href="admin_add_sensor.css">
</head>
<body>

  <!-- ===============================
       AUTH CHECK
  =============================== -->
  <script>
    if (!localStorage.getItem("jwt")) {
      window.location.href = "admin_login.html";
    }
  </script>

  <!-- ===============================
       PAGE CONTENT
  =============================== -->
  <div class="container mt-5">
    <div class="card shadow-sm p-4">

      <h4 class="mb-4">➕ Add Sensor</h4>

      <!-- Sensor Code Input -->
      <div class="mb-4">
        <label for="sensorCode" class="form-label">Sensor Code</label>
        <input
          type="text"
          id="sensorCode"
          class="form-control modern-input"
          placeholder="e.g. IAQ-SENSOR-001"
          autofocus
        >
      </div>

      <!-- Action Buttons -->
      <div class="d-flex gap-2">
        <button
          id="saveBtn"
          class="btn btn-primary"
          onclick="addSensor()"
        >
          <span id="saveText">Save Sensor</span>
          <span
            id="saveSpinner"
            class="spinner-border spinner-border-sm d-none ms-2"
            role="status"
            aria-hidden="true"
          ></span>
        </button>

        <button
          class="btn btn-secondary"
          onclick="goBack()"
        >
          Cancel
        </button>
      </div>

    </div>
  </div>

  <!-- ===============================
       SUCCESS ANIMATION OVERLAY
  =============================== -->
  <div id="successOverlay" class="success-overlay d-none">
    <div class="success-card">
      <div class="checkmark">
        <svg viewBox="0 0 52 52">
          <circle
            class="checkmark-circle"
            cx="26"
            cy="26"
            r="25"
            fill="none"
          />
          <path
            class="checkmark-check"
            fill="none"
            d="M14 27 l7 7 l17 -17"
          />
        </svg>
      </div>
      <h5 class="mt-3">Sensor Added Successfully</h5>
    </div>
  </div>

  <!-- ===============================
       SCRIPT
  =============================== -->
  <script>
    /* --------------------------------
       CONFIG
    -------------------------------- */
    const API_BASE = "http://localhost:5000/api";

    /* --------------------------------
       ADD SENSOR
    -------------------------------- */
    function addSensor() {
      const sensorCodeInput = document.getElementById("sensorCode");
      const saveBtn = document.getElementById("saveBtn");
      const saveText = document.getElementById("saveText");
      const saveSpinner = document.getElementById("saveSpinner");

      const sensorCode = sensorCodeInput.value.trim();

      // Validation
      if (!sensorCode) {
        alert("Sensor code is required");
        sensorCodeInput.focus();
        return;
      }

      // Show loading state
      setLoading(true);

      fetch(`${API_BASE}/admin/sensors`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${localStorage.getItem("jwt")}`
        },
        body: JSON.stringify({ sensor_code: sensorCode })
      })
      .then(async res => {
        const data = await res.json();

        if (!res.ok) {
          alert(data.error || data.message || "Failed to add sensor");
          return;
        }

        showSuccessAnimation();
      })
      .catch(err => {
        console.error("Add sensor error:", err);
        alert("Server error");
      })
      .finally(() => {
        setLoading(false);
      });

      function setLoading(isLoading) {
        saveBtn.disabled = isLoading;
        saveSpinner.classList.toggle("d-none", !isLoading);
        saveText.textContent = isLoading ? "Saving..." : "Save Sensor";
      }
    }

    /* --------------------------------
       SUCCESS ANIMATION
    -------------------------------- */
    function showSuccessAnimation() {
      const overlay = document.getElementById("successOverlay");
      overlay.classList.remove("d-none");

      setTimeout(() => {
        window.location.href = "admin_panel.html#sensors";
      }, 1200);
    }

    /* --------------------------------
       NAVIGATION
    -------------------------------- */
    function goBack() {
      window.location.href = "admin_panel.html#sensors";
    }
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const hash = window.location.hash;

      if (hash) {
        const tabButton = document.querySelector(
          `button[data-bs-target="${hash}"]`
        );

        if (tabButton) {
          new bootstrap.Tab(tabButton).show();
        }
      }
    });

    // 🔄 Auto-refresh room dropdown if rooms updated elsewhere
    let lastRoomUpdate = localStorage.getItem("roomsUpdated");

    setInterval(() => {
      const current = localStorage.getItem("roomsUpdated");

      if (current && current !== lastRoomUpdate) {
        lastRoomUpdate = current;
        loadRooms(); // 🔄 refresh dropdown
      }
    }, 1000);
  </script>


</body>
</html>
