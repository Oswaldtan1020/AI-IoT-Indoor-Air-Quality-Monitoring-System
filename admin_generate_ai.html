<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate AI Recommendation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link href="admin_generate_ai.css" rel="stylesheet">
</head>
<body class="bg-light">

<script>
  if (!localStorage.getItem("jwt")) {
    window.location.href = "admin_login.html";
  }
</script>

<div class="container mt-5">
  <div class="card shadow-sm p-4 text-center">

    <h4 class="text-primary mb-3">🤖 Generate AI Recommendation</h4>

    <p id="roomName" class="fw-bold"></p>

    <p class="text-muted">
      This will generate a new AI air quality recommendation for this room
      based on the latest sensor readings.
    </p>

    <div class="d-flex justify-content-center gap-3 mt-4">
      <button class="btn btn-primary" onclick="generateAI()">
        Generate AI
      </button>

      <button class="btn btn-secondary" onclick="goBack()">
        Cancel
      </button>
    </div>

    <div id="statusMsg" class="mt-4"></div>

  </div>
</div>

<script>
const API = "https://ai-iot-indoor-air-quality-monitoring-system-production.up.railway.app/api";
const params = new URLSearchParams(window.location.search);
const roomId = params.get("roomId");
const room = params.get("room");

document.getElementById("roomName").innerText =
  "Room: " + room;

function generateAI() {
  document.getElementById("statusMsg").innerHTML =
    `<div class="alert alert-info">Generating AI recommendation...</div>`;

  fetch(`${API}/admin/rooms/${roomId}/generate-ai`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${localStorage.getItem("jwt")}`
    },
    body: JSON.stringify({ roomId })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("statusMsg").innerHTML =
      `<div class="alert alert-success">
        AI recommendation generated successfully ✅
      </div>`;

    setTimeout(() => {
      window.location.href = "admin_panel.html#rooms";
    }, 1200);
  })
  .catch(() => {
    document.getElementById("statusMsg").innerHTML =
      `<div class="alert alert-danger">
        Failed to generate AI recommendation
      </div>`;
  });
}

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
