<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset User Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Reuse your existing animation & overlay styles -->
  <link rel="stylesheet" href="admin_reset_password.css">
</head>
<body>

<script>
  // 🔐 Protect page
  if (!localStorage.getItem("jwt")) {
    window.location.href = "admin_login.html";
  }
</script>

<!-- ===============================
     FEEDBACK OVERLAY
=============================== -->
<div id="feedbackOverlay" class="feedback-overlay d-none">
  <div class="feedback-card">

    <!-- SUCCESS -->
    <div id="successIcon" class="checkmark d-none">
      <svg viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark-check" fill="none"
          d="M14 27 l7 7 l17 -17"/>
      </svg>
    </div>

    <!-- ERROR -->
    <div id="errorIcon" class="error-icon d-none">❌</div>

    <h5 id="feedbackText" class="mt-3"></h5>
  </div>
</div>

<!-- ===============================
     MAIN CONTENT
=============================== -->
<div class="container mt-5">
  <div class="card shadow-sm p-4 text-center">

    <h4 class="mb-3 text-warning">🔐 Reset User Password</h4>

    <p class="mb-4">
      Enter a new password for this user.<br>
      <strong>The old password will no longer work.</strong>
    </p>

    <div class="mb-3 text-start">
      <label class="form-label">New Password</label>
      <input
        type="password"
        id="newPassword"
        class="form-control"
        placeholder="Enter new password"
      >
      <small class="text-muted">
        Password must be at least 6 characters.
      </small>
    </div>

    <div class="d-flex justify-content-center gap-3 mt-4">
      <button class="btn btn-warning" onclick="resetPassword()">
        Reset Password
      </button>
      <button class="btn btn-secondary" onclick="goBack()">
        Cancel
      </button>
    </div>

  </div>
</div>

<script>
const API = "https://ai-iot-indoor-air-quality-monitoring-system-production.up.railway.app/api";
const params = new URLSearchParams(window.location.search);
const userId = params.get("id");

/* ------------------------------
   RESET PASSWORD
------------------------------ */
function resetPassword() {
  const password = document.getElementById("newPassword").value.trim();

  if (!password || password.length < 6) {
    showError("Password must be at least 6 characters");
    return;
  }

  fetch(`${API}/admin/users/${userId}/reset-password`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${localStorage.getItem("jwt")}`
    },
    body: JSON.stringify({ password })
  })
  .then(async res => {
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || "Failed to reset password");
      return;
    }

    showSuccess("Password reset successfully");
  })
  .catch(err => {
    console.error(err);
    showError("Server error");
  });
}

/* ------------------------------
   FEEDBACK HANDLER
------------------------------ */
function showSuccess(message) {
  showFeedback("success", message, "admin_panel.html#users");
}

function showError(message) {
  showFeedback("error", message);
}

function showFeedback(type, message, redirectUrl = null) {
  const overlay = document.getElementById("feedbackOverlay");
  const successIcon = document.getElementById("successIcon");
  const errorIcon = document.getElementById("errorIcon");
  const text = document.getElementById("feedbackText");

  successIcon.classList.add("d-none");
  errorIcon.classList.add("d-none");

  if (type === "success") {
    successIcon.classList.remove("d-none");
  } else {
    errorIcon.classList.remove("d-none");
  }

  text.textContent = message;
  overlay.classList.remove("d-none");

  setTimeout(() => {
    overlay.classList.add("d-none");
    if (redirectUrl) {
      window.location.href = redirectUrl;
    }
  }, type === "success" ? 1200 : 1500);
}

function goBack() {
  window.location.href = "admin_panel.html#users";
}
</script>

</body>
</html>
